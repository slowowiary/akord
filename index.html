<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Пісенник</title>

  <style>

    body {
      margin: 0;
      padding: 20px;

      background: #f5f5f5;
      color: #111;

      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* ── LIST VIEW ── */

    #list-view {
      display: block;
    }

    #search-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    #search {
      flex: 1;
      padding: 12px 16px;
      font-size: 18px;
      border: 2px solid #2196F3;
      border-radius: 10px;
      box-sizing: border-box;
      outline: none;
      background: white;
      color: #111;
    }

    #search:focus {
      border-color: #1565C0;
      box-shadow: 0 0 0 3px rgba(33,150,243,0.2);
    }

    #search-content-label {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
    }

    #search-content-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #2196F3;
    }

    #songs {
      margin-bottom: 20px;
    }

    .song-btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;

      background: white;
      color: black;

      border: 1px solid #ddd;
      border-radius: 10px;

      text-align: left;

      font-size: 18px;

      cursor: pointer;
    }

    .song-btn:hover {
      background: #eee;
    }

    /* ── SONG VIEW ── */

    #song-view {
      display: none;
    }

    .controls {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .controls-left {
      display: flex;
      gap: 10px;
    }

    .controls-right {
      margin-left: auto;
    }

    .controls button {
      width: 50px;
      height: 50px;

      border: 1px solid #ccc;
      border-radius: 10px;

      background: white;

      font-size: 24px;

      cursor: pointer;
    }

    .controls button:hover {
      background: #eee;
    }

    #btn-back {
      width: auto !important;
      padding: 0 22px;
      background: #ff7b7b !important;
      border-color: #e05555 !important;
      color: white;
      font-size: 18px !important;
      font-weight: bold;
    }

    #btn-back:hover {
      background: #e05555 !important;
    }

    .song-wrapper {
      overflow-x: auto;
      padding-bottom: 100px;
    }

    .song {

      white-space: pre;

      font-family: monospace;

      font-size: 24px;

      line-height: 1.3;

      min-width: max-content;
    }

    .chord {
      color: red;
      font-weight: bold;
    }

    @media (max-width: 768px) {

      body {
        padding: 10px;
      }

      .song {
        font-size: 18px;
      }

      .song-btn {
        font-size: 16px;
      }

      #search {
        font-size: 16px;
      }

      #search-content-label {
        font-size: 14px;
      }
    }

  </style>
</head>
<body>

<div class="container">

  <h1>Пісенник</h1>

  <!-- LIST VIEW -->
  <div id="list-view">

    <div id="search-row">
      <input id="search" type="text" placeholder="Пошук…" oninput="filterSongs()">
      <label id="search-content-label">
        <input type="checkbox" id="search-in-content" onchange="filterSongs()">
        Шукати в тексті пісні
      </label>
    </div>

    <div id="songs"></div>

  </div>

  <!-- SONG VIEW -->
  <div id="song-view">

    <div class="controls">
      <div class="controls-left">
        <button onclick="changeKey(-1)">−</button>
        <button onclick="changeKey(1)">+</button>
      </div>
      <div class="controls-right">
        <button id="btn-back" onclick="goBack()">← Назад</button>
      </div>
    </div>

    <div class="song-wrapper">
      <div class="song" id="song"></div>
    </div>

  </div>

</div>

<script>

  const NOTES = [
    'C',
    'C#',
    'D',
    'D#',
    'E',
    'F',
    'F#',
    'G',
    'G#',
    'A',
    'A#',
    'B'
  ]

  let currentSong = null
  let transpose = 0

  let allFiles = []

  // songsIndex[file] = { name: string, content: string }
  const songsIndex = {}

  async function loadSongs() {

    const response = await fetch('./songs-manifest.json')
    allFiles = await response.json()

    // Pre-load all song content for content search
    await Promise.all(allFiles.map(async file => {
      try {
        const r = await fetch('./songs/' + file)
        const data = await r.json()
        const name = file.replace('.json', '').toLowerCase()
        const content = (data.content || []).join(' ').toLowerCase()
        songsIndex[file] = { name, content }
      } catch(e) {
        const name = file.replace('.json', '').toLowerCase()
        songsIndex[file] = { name, content: '' }
      }
    }))

    renderSongList()
  }

  function filterSongs() {
    renderSongList()
  }

  function renderSongList() {
    const rawQuery = document.getElementById('search').value
    const useContent = document.getElementById('search-in-content').checked

    // Split query into individual words, ignore empty parts
    const words = rawQuery.trim().toLowerCase().split(/\s+/).filter(w => w.length > 0)

    const songsDiv = document.getElementById('songs')
    songsDiv.innerHTML = ''

    const filtered = words.length === 0
      ? allFiles
      : allFiles.filter(file => {
          const idx = songsIndex[file]
          if (!idx) return false

          // Build the text to search in
          const searchText = useContent
            ? idx.name + ' ' + idx.content
            : idx.name

          // ALL words must appear somewhere in the search text
          return words.every(word => searchText.includes(word))
        })

    filtered.forEach(file => {
      const button = document.createElement('button')
      button.className = 'song-btn'
      button.innerText = file.replace('.json', '')
      button.onclick = () => openSong(file)
      songsDiv.appendChild(button)
    })
  }

  async function openSong(file) {
    const response = await fetch('./songs/' + file)
    currentSong = await response.json()
    transpose = 0
    renderSong()

    // Switch views
    document.getElementById('list-view').style.display = 'none'
    document.getElementById('song-view').style.display = 'block'

    // Scroll to top
    window.scrollTo(0, 0)
  }

  function goBack() {
    currentSong = null
    document.getElementById('song').innerHTML = ''
    document.getElementById('song-view').style.display = 'none'
    document.getElementById('list-view').style.display = 'block'
  }

  function changeKey(step) {
    transpose += step
    renderSong()
  }

  function transposeChord(chord, step) {

    const match = chord.match(/^([A-G]#?)(.*)$/)

    if (!match) return chord

    const root = match[1]

    const suffix = match[2]

    let index = NOTES.indexOf(root)

    if (index === -1) return chord

    index = (index + step + NOTES.length) % NOTES.length

    return NOTES[index] + suffix
  }

  function renderSong() {

    if (!currentSong) return

    let html = ''

    currentSong.content.forEach(line => {

      line = line.replace(
        /\[(.*?)\]/g,
        (_, chord) => {

          return `<span class="chord">${
            transposeChord(chord, transpose)
          }</span>`
        }
      )

      html += line + '\n'
    })

    document.getElementById('song').innerHTML = html
  }

  loadSongs()

</script>

</body>
</html>
