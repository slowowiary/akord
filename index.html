<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Пісенник</title>

  <style>

    body {
      margin: 0;
      padding: 20px;

      background: #f5f5f5;
      color: #111;

      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      margin-bottom: 20px;
    }

    #songs {
      margin-bottom: 20px;
    }

    #search-wrapper {
      margin-bottom: 14px;
    }

    #search {
      width: 100%;
      padding: 12px 16px;
      font-size: 18px;
      border: 2px solid #2196F3;
      border-radius: 10px;
      box-sizing: border-box;
      outline: none;
      background: white;
      color: #111;
    }

    #search:focus {
      border-color: #1565C0;
      box-shadow: 0 0 0 3px rgba(33,150,243,0.2);
    }

    .song-btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;

      background: white;
      color: black;

      border: 1px solid #ddd;
      border-radius: 10px;

      text-align: left;

      font-size: 18px;

      cursor: pointer;
    }

    .song-btn:hover {
      background: #eee;
    }

    .controls {
      margin-bottom: 20px;
    }

    .controls button {

      width: 50px;
      height: 50px;

      margin-right: 10px;

      border: 1px solid #ccc;
      border-radius: 10px;

      background: white;

      font-size: 24px;

      cursor: pointer;
    }

    .song-wrapper {
      overflow-x: auto;
      padding-bottom: 100px;
    }

    .song {

      white-space: pre;

      font-family: monospace;

      font-size: 24px;

      line-height: 1.3;

      min-width: max-content;
    }

    .chord {
      color: red;
      font-weight: bold;
    }

    @media (max-width: 768px) {

      body {
        padding: 10px;
      }

      .song {
        font-size: 18px;
      }

      .song-btn {
        font-size: 16px;
      }
    }

  </style>
</head>
<body>

<div class="container">

  <h1>Пісенник</h1>

  <div class="controls">
    <button onclick="changeKey(-1)">-</button>
    <button onclick="changeKey(1)">+</button>
  </div>

  <div class="song-wrapper">
    <div class="song" id="song"></div>
  </div>

  <div id="search-wrapper">
    <input id="search" type="text" placeholder="Пошук за назвою або словами пісні…" oninput="filterSongs(this.value)">
  </div>

  <div id="songs"></div>

</div>

<script>

  const NOTES = [
    'C',
    'C#',
    'D',
    'D#',
    'E',
    'F',
    'F#',
    'G',
    'G#',
    'A',
    'A#',
    'B'
  ]

  let currentSong = null
  let transpose = 0

  let allFiles = []
  // songsIndex: { file → lowercase searchable text (name + content) }
  const songsIndex = {}

  async function loadSongs() {

    const response = await fetch('./songs-manifest.json')
    allFiles = await response.json()

    // Pre-load all song content for content search
    await Promise.all(allFiles.map(async file => {
      try {
        const r = await fetch('./songs/' + file)
        const data = await r.json()
        const name = file.replace('.json', '').toLowerCase()
        const content = (data.content || []).join(' ').toLowerCase()
        songsIndex[file] = name + ' ' + content
      } catch(e) {
        songsIndex[file] = file.replace('.json', '').toLowerCase()
      }
    }))

    renderSongList('')
  }

  function renderSongList(query) {
    const q = query.trim().toLowerCase()
    const songsDiv = document.getElementById('songs')
    songsDiv.innerHTML = ''

    const filtered = q
      ? allFiles.filter(file => (songsIndex[file] || '').includes(q))
      : allFiles

    filtered.forEach(file => {
      const button = document.createElement('button')
      button.className = 'song-btn'
      button.innerText = file.replace('.json', '')
      button.onclick = () => loadSong(file)
      songsDiv.appendChild(button)
    })
  }

  function filterSongs(query) {
    renderSongList(query)
  }

  async function loadSong(file) {

    const response = await fetch('./songs/' + file)

    currentSong = await response.json()

    transpose = 0

    renderSong()
  }

  function changeKey(step) {

    transpose += step

    renderSong()
  }

  function transposeChord(chord, step) {

    const match = chord.match(/^([A-G]#?)(.*)$/)

    if (!match) return chord

    const root = match[1]

    const suffix = match[2]

    let index = NOTES.indexOf(root)

    if (index === -1) return chord

    index = (index + step + NOTES.length) % NOTES.length

    return NOTES[index] + suffix
  }

  function renderSong() {

    if (!currentSong) return

    let html = ''

    currentSong.content.forEach(line => {

      line = line.replace(
        /\[(.*?)\]/g,
        (_, chord) => {

          return `<span class="chord">${
            transposeChord(chord, transpose)
          }</span>`
        }
      )

      html += line + '\n'
    })

    document.getElementById('song').innerHTML = html
  }

  loadSongs()

</script>

</body>
</html>
