<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Пісенник</title>

  <style>

    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      margin-bottom: 20px;
    }

    #songs {
      margin-bottom: 20px;
    }

    .song-btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;

      background: #222;
      color: white;

      border: none;
      border-radius: 10px;

      text-align: left;

      font-size: 18px;

      cursor: pointer;
    }

    .song-btn:hover {
      background: #333;
    }

    .controls {
      margin-bottom: 20px;
    }

    .controls button {

      width: 50px;
      height: 50px;

      margin-right: 10px;

      border: none;
      border-radius: 10px;

      font-size: 24px;

      cursor: pointer;
    }

    .song-wrapper {
      overflow-x: auto;
      padding-bottom: 100px;
    }

    .song {

      white-space: pre;

      font-family: monospace;

      font-size: 24px;

      line-height: 1.6;

      min-width: max-content;
    }

    .chord {
      color: #ff3b30;
      font-weight: bold;
    }

    @media (max-width: 768px) {

      body {
        padding: 10px;
      }

      .song {
        font-size: 18px;
      }

      .song-btn {
        font-size: 16px;
      }
    }

  </style>
</head>
<body>

<div class="container">

  <h1>Пісенник</h1>

  <div id="songs"></div>

  <div class="controls">
    <button onclick="changeKey(-1)">-</button>
    <button onclick="changeKey(1)">+</button>
  </div>

  <div class="song-wrapper">
    <div class="song" id="song"></div>
  </div>

</div>

<script>

  const NOTES = [
    'C',
    'C#',
    'D',
    'D#',
    'E',
    'F',
    'F#',
    'G',
    'G#',
    'A',
    'A#',
    'B'
  ]

  let currentSong = null
  let transpose = 0

  async function loadSongs() {

    const response = await fetch('./songs-manifest.json')

    const files = await response.json()

    const songsDiv = document.getElementById('songs')

    songsDiv.innerHTML = ''

    files.forEach(file => {

      const button = document.createElement('button')

      button.className = 'song-btn'

      button.innerText = file.replace('.json', '')

      button.onclick = () => loadSong(file)

      songsDiv.appendChild(button)
    })
  }

  async function loadSong(file) {

    const response = await fetch('./songs/' + file)

    currentSong = await response.json()

    transpose = 0

    renderSong()
  }

  function changeKey(step) {

    transpose += step

    renderSong()
  }

  function transposeChord(chord, step) {

    const match = chord.match(/^([A-G]#?)(.*)$/)

    if (!match) return chord

    const root = match[1]

    const suffix = match[2]

    let index = NOTES.indexOf(root)

    if (index === -1) return chord

    index = (index + step + NOTES.length) % NOTES.length

    return NOTES[index] + suffix
  }

  function renderSong() {

    if (!currentSong) return

    let html = ''

    currentSong.content.forEach(line => {

      line = line.replace(
        /\[(.*?)\]/g,
        (_, chord) => {

          return `<span class="chord">${
            transposeChord(chord, transpose)
          }</span>`
        }
      )

      html += line + '\n'
    })

    document.getElementById('song').innerHTML = html
  }

  loadSongs()

</script>

</body>
</html>
